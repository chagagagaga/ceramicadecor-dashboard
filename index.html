const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(){
  const btn=document.getElementById('go'), err=document.getElementById('err');
  btn.disabled=true; err.textContent='Расшифровка…';
  try{
    const pw=document.getElementById('pw').value;
    const keyMat=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:600000, hash:'SHA-256'}, keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(PAYLOAD.iv)}, key, b64(PAYLOAD.data));
    document.open(); document.write(new TextDecoder().decode(plain)); document.close();
  }catch(e){ err.textContent='Неверный пароль'; btn.disabled=false; }
}
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
</script></body></html>
